<!DOCTYPE html>
<html lang="ja" xmlns="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Blogs</title>
</head>

<body>
    <header>
        <h1 class="title">blog-app</h1>
        <nav class="nav">
            <ul class="menu-group">
                <li class="menu-item"><a href="/blogs">記事一覧</a></li>
                <!-- <li class="menu-item"><a href="/blogs">記事一覧</a></li> -->
                <li class="menu-item"><a href="blogs/post">投稿</a></li>
                <li class="menu-item"><a href="#">プロフィール</a></li>
            </ul>
        </nav>
    </header>
    <h1>記事一覧</h1>
    <table>
        <tr>
            <th>タイトル</th>
            <th>本文</th>
        </tr>
        <tr th:each="blog : ${blogs}">
            <td><a th:href="@{/blogs/{id}(id=${blog.id})}" th:text="${blog.title}">タイトル</a></td>
            <!-- <td th:text="${blog.title}">タイトル</td> -->
            <td class="line"><span th:text="${blog.content}">本文</span></td>
        </tr>
    </table>
</body>

</html>
