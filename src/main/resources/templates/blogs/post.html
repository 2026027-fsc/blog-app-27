<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>BlogPost</title>
</head>
<body>
    <header>
    <h1 class="title">blog-app</h1>
    <nav class="nav">
        <ul class="menu-group">
            <li class="menu-item"><a href="/blogs">記事一覧</a></li>
            <!-- <li class="menu-item"><a href="/blogs">記事一覧</a></li> -->
            <li class="menu-item"><a href="blogs/post">投稿</a></li>
            <li class="menu-item"><a href="#">プロフィール</a></li>
        </ul>
    </nav>
    </header>
    <h1>記事を投稿する</h1>
    <form action="/blogs" method="post">
    <label for="title"></label>
    タイトル<br>
    <input type="text" id="title" name="title" placeholder="" size="30px" required><br>
    <label for="content"></label>
    本文<br>
    <textarea type="textarea" id="content" name="content" placeholder="" required>
    </textarea><br>
    <button type="submit">保存</button>
    <a href="/blogs">キャンセル</a>
    </form>
</body>
</html>
